<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clutch</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111;
  --surface2: #181818;
  --surface3: #1e1e1e;
  --border: #1f1f1f;
  --border2: #2a2a2a;
  --text: #e8e8e8;
  --text2: #888;
  --text3: #444;
  --accent: #3b82f6;
  --green: #22c55e;
  --red: #ef4444;
  --amber: #f59e0b;
  --font-mono: "SF Mono", "Fira Code", ui-monospace, monospace;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 13px;
  line-height: 1.4;
}

/* ── Header ─────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 100;
  height: 48px;
}

.logo {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text);
  margin-right: 28px;
  white-space: nowrap;
}
.logo span { color: var(--accent); }

/* Tab nav */
.tabs { display: flex; gap: 0; height: 100%; align-items: stretch; }
.tab {
  padding: 0 18px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  display: flex; align-items: center;
  transition: color 0.15s, border-color 0.15s;
  user-select: none;
  white-space: nowrap;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }

.header-sep { flex: 1; }
#cam-count { font-size: 11px; color: var(--text3); font-family: var(--font-mono); margin-right: 16px; }

/* Studio controls */
.studio-area {
  display: flex; align-items: center; gap: 8px;
  padding-right: 14px;
  margin-right: 14px;
  border-right: 1px solid var(--border);
}
.studio-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); transition: background 0.2s; }
.studio-dot.connected { background: var(--green); box-shadow: 0 0 5px var(--green); }
.studio-label { font-family: var(--font-mono); font-size: 10px; color: var(--text3); white-space: nowrap; }
.studio-label.connected { color: var(--text2); }
/* Tag control */
.tag-area { display: flex; align-items: center; gap: 8px; margin-right: 14px; padding-right: 14px; border-right: 1px solid var(--border); }
.tag-label { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }
.seg { display: flex; border: 1px solid var(--border2); border-radius: 5px; overflow: hidden; }
.seg-btn { padding: 4px 10px; font-size: 11px; font-weight: 500; color: var(--text2); background: var(--surface2); border: none; cursor: pointer; transition: background 0.12s, color 0.12s; white-space: nowrap; }
.seg-btn + .seg-btn { border-left: 1px solid var(--border2); }
.seg-btn:hover:not(.active) { background: #222; color: var(--text); }
.seg-btn.active { background: #1e3a5f; color: var(--accent); }
/* FPS control */
.fps-area { display: flex; align-items: center; gap: 6px; margin-right: 14px; padding-right: 14px; border-right: 1px solid var(--border); }
.fps-label { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }
.fps-input { width: 42px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 4px; color: var(--text); font-family: var(--font-mono); font-size: 11px; padding: 3px 6px; text-align: center; outline: none; -moz-appearance: textfield; }
.fps-input::-webkit-inner-spin-button, .fps-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.fps-input:focus { border-color: var(--accent); }
/* Recording controls */
.rec-area { display: flex; align-items: center; gap: 10px; }
#rec-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); transition: background 0.2s; }
#rec-dot.active { background: var(--red); animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
#rec-label { font-family: var(--font-mono); font-size: 11px; color: var(--text2); min-width: 100px; }

.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 13px;
  border-radius: 5px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text);
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
  white-space: nowrap;
}
.btn:hover:not(:disabled) { background: #222; border-color: #3a3a3a; }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn.danger { border-color: #5a1a1a; color: var(--red); }
.btn.danger:hover:not(:disabled) { background: #1c0808; border-color: var(--red); }
.btn.primary { border-color: #1e3a5f; color: var(--accent); }
.btn.primary:hover:not(:disabled) { background: #0d1e30; border-color: var(--accent); }

/* ── Page areas ──────────────────────────────────────────── */
.page { display: none; padding: 20px; }
.page.active { display: block; }

/* ── Camera grid ─────────────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(540px, 1fr));
  gap: 16px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

/* Stream */
.stream-wrap {
  position: relative;
  background: #000;
  aspect-ratio: 2448 / 2048;
  overflow: hidden;
}
.stream-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }

/* Paused overlay */
.stream-paused {
  position: absolute; inset: 0;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px;
  color: var(--text3);
  font-size: 11px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.stream-paused svg { width: 28px; height: 28px; fill: var(--text3); opacity: 0.4; }

/* Init overlay */
.stream-init {
  position: absolute; inset: 0;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px;
  color: var(--text3);
  font-size: 11px;
}
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Stream overlays */
.stream-top {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 10px 12px;
  display: flex; align-items: flex-start; justify-content: space-between;
  background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 100%);
  pointer-events: none;
}
.cam-id { font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: #fff; }
.cam-sub { font-size: 10px; color: rgba(255,255,255,0.45); margin-top: 2px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; background: var(--text3); }
.status-dot.grabbing { background: var(--green); box-shadow: 0 0 5px var(--green); }
.status-dot.open { background: var(--amber); }

.stream-bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 8px 12px;
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
}
.stats-row { display: flex; gap: 12px; font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,0.45); }
.stats-row .v { color: rgba(255,255,255,0.8); }

.play-btn {
  width: 30px; height: 30px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.55);
  color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s, border-color 0.12s;
  flex-shrink: 0;
}
.play-btn:hover { background: rgba(0,0,0,0.8); border-color: rgba(255,255,255,0.45); }
.play-btn svg { width: 11px; height: 11px; fill: currentColor; }

/* Params panel */
.params-panel { border-top: 1px solid var(--border); padding: 12px 16px 14px; }
.params-hdr {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--text2);
  cursor: pointer; user-select: none; margin-bottom: 11px;
}
.params-hdr .chev { transition: transform 0.18s; font-size: 9px; color: var(--text3); }
.params-hdr.closed .chev { transform: rotate(-90deg); }
.params-body { display: flex; flex-direction: column; gap: 9px; }
.params-body.hidden { display: none; }

.param-row { display: grid; grid-template-columns: 68px 1fr 68px 36px; align-items: center; gap: 8px; }
.p-label { font-size: 11px; color: var(--text2); text-align: right; }
.p-unit  { font-size: 10px; color: var(--text3); font-family: var(--font-mono); }

input[type=range] {
  -webkit-appearance: none; width: 100%; height: 3px;
  background: var(--border2); border-radius: 2px; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 13px; height: 13px;
  border-radius: 50%; background: var(--accent); cursor: pointer;
  box-shadow: 0 0 0 2px rgba(59,130,246,0.25);
}
input[type=range]:disabled { opacity: 0.25; cursor: not-allowed; }

.p-input {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 4px; color: var(--text); font-family: var(--font-mono);
  font-size: 11px; padding: 3px 6px; width: 100%; text-align: right; outline: none;
}
.p-input:focus { border-color: var(--accent); }
.p-input.dirty { border-color: var(--amber); }
.p-input:disabled { opacity: 0.25; cursor: not-allowed; }

.params-footer { margin-top: 11px; display: flex; justify-content: flex-end; }
.apply-btn {
  padding: 4px 14px; border-radius: 4px;
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--text2); font-size: 11px; font-weight: 500; cursor: pointer;
  transition: all 0.12s;
}
.apply-btn:hover:not(:disabled) { background: #222; color: var(--text); border-color: #3a3a3a; }
.apply-btn.dirty { border-color: var(--amber); color: var(--amber); background: rgba(245,158,11,0.07); }
.apply-btn:disabled { opacity: 0.25; cursor: not-allowed; }

/* ── Recordings tab ──────────────────────────────────────── */
.rec-toolbar {
  display: none; align-items: center; gap: 10px;
  max-width: 960px; margin-bottom: 10px;
  padding: 8px 14px; border-radius: 6px;
  background: var(--surface2); border: 1px solid var(--border2);
}
.rec-toolbar.visible { display: flex; }
.rec-sel-count { font-size: 12px; color: var(--text2); flex: 1; font-family: var(--font-mono); }
.rec-list { display: flex; flex-direction: column; gap: 8px; max-width: 960px; }

.rec-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.rec-item.selected { border-color: #1e3a5f; background: #0a1520; }
.rec-item-hdr {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 18px;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s;
}
.rec-item-hdr:hover { background: var(--surface2); }
.rec-check {
  width: 15px; height: 15px; flex-shrink: 0;
  accent-color: var(--accent); cursor: pointer;
}

.rec-id {
  font-family: var(--font-mono); font-size: 13px; font-weight: 600;
  color: var(--text);
}

.rec-pills { display: flex; gap: 6px; align-items: center; }
.pill {
  padding: 2px 8px; border-radius: 10px;
  font-size: 10px; font-weight: 600;
  background: var(--surface3); color: var(--text2);
  border: 1px solid var(--border2);
  white-space: nowrap;
}

.rec-item-hdr-sep { flex: 1; }
.rec-chev { color: var(--text3); font-size: 10px; transition: transform 0.2s; margin-left: 10px; }
.rec-item-hdr.open .rec-chev { transform: rotate(180deg); }

.del-btn {
  width: 26px; height: 26px; border-radius: 4px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.12s, background 0.12s, border-color 0.12s;
  flex-shrink: 0;
}
.del-btn:hover { color: var(--red); background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.25); }
.del-btn svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }

.rec-detail {
  border-top: 1px solid var(--border);
  padding: 18px;
  display: none;
}
.rec-detail.open { display: block; }

/* Detail layout */
.rec-meta-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 18px;
}
.rec-meta-cell {
  background: var(--surface2);
  padding: 10px 14px;
}
.rec-meta-cell .lbl { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
.rec-meta-cell .val { font-family: var(--font-mono); font-size: 12px; color: var(--text); }

.rec-cameras-hdr {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--text2); margin-bottom: 10px;
}

.rec-cameras-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
}

.cam-card {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 12px 14px;
}
.cam-card-hdr {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 10px;
  padding-bottom: 9px;
  border-bottom: 1px solid var(--border);
}
.cam-card-id { font-family: var(--font-mono); font-size: 12px; font-weight: 600; }
.cam-card-model { font-size: 10px; color: var(--text2); margin-top: 2px; }
.cam-stat { text-align: right; }
.cam-stat .sv { font-family: var(--font-mono); font-size: 13px; font-weight: 600; }
.cam-stat .sl { font-size: 10px; color: var(--text2); margin-top: 1px; }

.cam-params { display: flex; flex-direction: column; gap: 5px; }
.cam-param-row {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px;
}
.cam-param-row .pk { color: var(--text2); }
.cam-param-row .pv { font-family: var(--font-mono); color: var(--text); }

/* Empty/loading states */
.empty {
  padding: 60px 0; text-align: center; color: var(--text3);
  font-size: 12px; grid-column: 1/-1;
}
.empty .spinner { margin: 0 auto 12px; }
</style>
</head>
<body>

<header>
  <div class="logo">Clutch <span>//</span></div>
  <nav class="tabs">
    <div class="tab active" id="tab-cameras" onclick="showTab('cameras')">Cameras</div>
    <div class="tab" id="tab-recordings" onclick="showTab('recordings')">Recordings</div>
  </nav>
  <div class="header-sep"></div>
  <span id="cam-count"></span>
  <div class="studio-area">
    <div class="studio-dot" id="studio-dot"></div>
    <span class="studio-label" id="studio-label">studio</span>
  </div>
  <div class="tag-area">
    <span class="tag-label">TAG</span>
    <div class="seg" id="tag-seg">
      <button class="seg-btn" data-tag="intrinsic" onclick="toggleTag('intrinsic')">intrinsic</button>
      <button class="seg-btn" data-tag="extrinsic" onclick="toggleTag('extrinsic')">extrinsic</button>
      <button class="seg-btn" data-tag="data"      onclick="toggleTag('data')">data</button>
    </div>
  </div>
  <div class="fps-area">
    <span class="fps-label">FPS</span>
    <input type="number" id="fps-input" class="fps-input" min="1" max="35" step="1" value="30"
      onchange="onGlobalFps(this.value)" onblur="onGlobalFps(this.value)">
  </div>
  <div class="rec-area">
    <div id="rec-dot"></div>
    <span id="rec-label">idle</span>
    <button class="btn primary" id="btn-rec" onclick="toggleRecording()">&#9679;&nbsp;Record</button>
  </div>
</header>

<!-- Cameras page -->
<div class="page active" id="page-cameras">
  <div class="grid" id="grid">
    <div class="empty"><div class="spinner"></div>Discovering cameras…</div>
  </div>
</div>

<!-- Recordings page -->
<div class="page" id="page-recordings">
  <div class="rec-toolbar" id="rec-toolbar">
    <span class="rec-sel-count" id="rec-sel-count"></span>
    <button class="btn danger" onclick="deleteSelected()">Delete selected</button>
    <button class="btn" onclick="clearSelection()">Clear</button>
  </div>
  <div class="rec-list" id="rec-list">
    <div class="empty"><div class="spinner"></div>Loading recordings…</div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
const cameras   = {};     // serial → status
const paramState = {};    // serial → { exposure, gain, frameRate, dirty }
const paused    = new Set(); // serials with stream display paused
let isRecording = false;
let globalFps = 30;
const selectedTags = new Set();
const selectedRecs = new Set();
let studioConnected = false;
let currentTab  = 'cameras';

// ── Tab switching ─────────────────────────────────────────────────────────
function showTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('page-' + name).classList.add('active');
  if (name === 'recordings') loadRecordings();
}

// ── API ───────────────────────────────────────────────────────────────────
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: {} };
  if (body !== null) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  return (await fetch(path, opts)).json();
}

// ── Init ──────────────────────────────────────────────────────────────────
async function init() {
  const list = await api('/api/cameras?discover=true');
  list.forEach(c => { cameras[c.serial] = c; });
  const n = list.length;
  document.getElementById('cam-count').textContent = n + ' camera' + (n !== 1 ? 's' : '');
  renderAll();
  for (const cam of list) autoStart(cam.serial);
}

async function autoStart(cid) {
  if (!cameras[cid].is_open) await api(`/api/cameras/${cid}/open`, 'POST', { frame_rate: globalFps });

  let updated = await api('/api/cameras');
  updated.forEach(c => { cameras[c.serial] = c; });

  if (!cameras[cid].is_grabbing) await api(`/api/cameras/${cid}/start`, 'POST');

  // Must refresh after start so renderCard sees is_grabbing=true and sets the stream src
  updated = await api('/api/cameras');
  updated.forEach(c => { cameras[c.serial] = c; });

  await refreshParams(cid);
  renderCard(cid);
}

// ── Camera grid ────────────────────────────────────────────────────────────
function renderAll() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const ids = Object.keys(cameras);
  if (!ids.length) { grid.innerHTML = '<div class="empty">No cameras found.</div>'; return; }
  ids.forEach(cid => renderCard(cid));
}

function renderCard(cid) {
  const cam = cameras[cid];
  const id  = cid;
  const ps  = paramState[cid] || {};
  const exp = ps.exposure  ?? 5000;
  const gn  = ps.gain      ?? 0;
  const dis = !cam.is_open ? 'disabled' : '';
  const dotCls = cam.is_grabbing ? 'grabbing' : cam.is_open ? 'open' : '';

  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + id;

  card.innerHTML = `
    <div class="stream-wrap">
      <img id="img-${id}" ${cam.is_grabbing && !paused.has(cid) ? `src="/api/cameras/${cid}/stream"` : ''} alt="">
      ${!cam.is_grabbing ? `
        <div class="stream-init" id="overlay-${id}">
          <div class="spinner"></div>
          <span>${cam.is_open ? 'Starting stream…' : 'Initialising…'}</span>
        </div>` : paused.has(cid) ? `
        <div class="stream-paused" id="overlay-${id}">
          <svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          Paused
        </div>` : `<div id="overlay-${id}" style="display:none"></div>`
      }
      <div class="stream-top">
        <div>
          <div class="cam-id">${cam.serial}</div>
          <div class="cam-sub">${cam.model} &middot; ${cam.ip}</div>
        </div>
        <div class="status-dot ${dotCls}" id="dot-${id}"></div>
      </div>
      <div class="stream-bottom">
        <div class="stats-row">
          <span>FPS&nbsp;<span class="v" id="fps-${id}">—</span></span>
          <span>Frames&nbsp;<span class="v" id="fc-${id}">—</span></span>
          <span>Lost&nbsp;<span class="v" id="lp-${id}">—</span></span>
        </div>
        <button class="play-btn" id="pb-${id}" onclick="togglePlay('${cid}')" title="Play/Pause">
          ${playIcon(cid, cam)}
        </button>
        <button class="play-btn" id="rb-${id}" onclick="rebootCamera('${cid}')" title="Reboot camera" style="margin-left:6px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
      </div>
    </div>
    <div class="params-panel">
      <div class="params-hdr" id="phdr-${id}" onclick="toggleParams('${id}')">
        Parameters <span class="chev">&#9660;</span>
      </div>
      <div class="params-body" id="pbody-${id}">
        ${pRow(cid, 'exposure',  'Exposure',   exp, 15, 100000, 'log', 'µs',  dis)}
        ${pRow(cid, 'gain',      'Gain',        gn,  0,  23.98, 'lin', 'dB',  dis)}
        <div class="params-footer">
          <button class="apply-btn" id="apply-${id}" onclick="submitParams('${cid}')" ${dis}>Apply</button>
        </div>
      </div>
    </div>`;

  const existing = document.getElementById('card-' + id);
  if (existing) existing.replaceWith(card);
  else document.getElementById('grid').appendChild(card);
}

function playIcon(cid, cam) {
  if (!cam.is_grabbing || paused.has(cid))
    return `<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>`;
  return `<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
}

// ── Reboot ────────────────────────────────────────────────────────────────
async function rebootCamera(cid) {
  const id = cid;
  const btn = document.getElementById(`rb-${id}`);
  if (btn) { btn.disabled = true; btn.style.opacity = '0.4'; }
  paused.add(cid);
  renderCard(cid, cameras[cid]);
  await api(`/api/cameras/${cid}/reboot`, 'POST', {});
  // Wait for camera to come back up then rediscover
  await new Promise(r => setTimeout(r, 8000));
  const list = await api('/api/cameras?discover=true');
  list.forEach(c => { cameras[c.serial] = c; });
  const refreshed = list.find(c => c.serial === cid);
  if (refreshed) {
    paused.delete(cid);
    await autoStart(cid);
  }
}

// ── Play / Pause (browser-side only, camera keeps grabbing) ───────────────
function togglePlay(cid) {
  const cam = cameras[cid];
  const id  = cid;

  if (!cam.is_grabbing) return; // still initialising, do nothing

  const img     = document.getElementById('img-' + id);
  const overlay = document.getElementById('overlay-' + id);
  const pb      = document.getElementById('pb-' + id);

  if (paused.has(cid)) {
    // Resume: reconnect stream
    paused.delete(cid);
    img.src = `/api/cameras/${cid}/stream`;
    overlay.style.display = 'none';
    pb.innerHTML = `<svg viewBox="0 0 24 24" style="width:11px;height:11px;fill:currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
  } else {
    // Pause: drop browser connection, show static paused state
    paused.add(cid);
    img.src = '';
    overlay.innerHTML = `<svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:#444;opacity:0.4"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg><span style="font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#444">Paused</span>`;
    overlay.className = 'stream-paused';
    overlay.style.display = '';
    pb.innerHTML = `<svg viewBox="0 0 24 24" style="width:11px;height:11px;fill:currentColor"><polygon points="5,3 19,12 5,21"/></svg>`;
  }
}

// ── Param rows ────────────────────────────────────────────────────────────
function pRow(cid, key, label, val, min, max, scale, unit, disabled) {
  const id  = cid;
  const sMin = scale === 'log' ? Math.log10(Math.max(min, 1)) : min;
  const sMax = scale === 'log' ? Math.log10(max) : max;
  const sVal = scale === 'log' ? Math.log10(Math.max(val, 1)) : val;
  const disp = fmt(val, unit);
  const step = scale === 'log' ? 0.01 : (unit === 'dB' ? 0.1 : 1);
  return `
    <div class="param-row">
      <span class="p-label">${label}</span>
      <input type="range" id="sl-${id}-${key}" min="${sMin}" max="${sMax}" step="${step}" value="${sVal}" ${disabled}
        oninput="onSlider('${cid}','${key}','${scale}','${unit}',this.value)">
      <input type="text" class="p-input" id="in-${id}-${key}" value="${disp}" ${disabled}
        onchange="onInput('${cid}','${key}','${scale}','${unit}',this.value)"
        onkeydown="if(event.key==='Enter')onInput('${cid}','${key}','${scale}','${unit}',this.value)">
      <span class="p-unit">${unit}</span>
    </div>`;
}

function fmt(val, unit) {
  if (unit === 'dB')  return parseFloat(val).toFixed(1);
  if (unit === 'fps') return Math.round(val);
  return Math.round(val);
}

function onSlider(cid, key, scale, unit, raw) {
  const val = scale === 'log' ? Math.pow(10, parseFloat(raw)) : parseFloat(raw);
  const el  = document.getElementById(`in-${cid}-${key}`);
  if (el) { el.value = fmt(val, unit); el.classList.add('dirty'); }
  markDirty(cid, key, val);
}

function onInput(cid, key, scale, unit, raw) {
  const val = parseFloat(raw);
  if (isNaN(val)) return;
  const sl  = document.getElementById(`sl-${cid}-${key}`);
  if (sl) sl.value = scale === 'log' ? Math.log10(Math.max(val, 1)) : val;
  document.getElementById(`in-${cid}-${key}`)?.classList.add('dirty');
  markDirty(cid, key, val);
}

function markDirty(cid, key, val) {
  if (!paramState[cid]) paramState[cid] = {};
  paramState[cid][key] = val;
  paramState[cid].dirty = true;
  document.getElementById(`apply-${cid}`)?.classList.add('dirty');
}

async function submitParams(cid) {
  const ps = paramState[cid];
  if (!ps?.dirty) return;
  const btn = document.getElementById(`apply-${cid}`);
  if (btn) { btn.disabled = true; btn.textContent = 'Applying…'; }
  const body = {};
  if (ps.exposure  != null) body.exposure_us = ps.exposure;
  if (ps.gain      != null) body.gain        = ps.gain;
  await api(`/api/cameras/${cid}/parameters`, 'POST', body);
  ps.dirty = false;
  ['exposure','gain'].forEach(k =>
    document.getElementById(`in-${cid}-${k}`)?.classList.remove('dirty'));
  if (btn) { btn.disabled = false; btn.textContent = 'Apply'; btn.classList.remove('dirty'); }
}

function toggleParams(id) {
  document.getElementById('pbody-' + id)?.classList.toggle('hidden');
  document.getElementById('phdr-'  + id)?.classList.toggle('closed');
}

// ── Stats polling ─────────────────────────────────────────────────────────
async function refreshParams(cid) {
  try {
    const p = await api(`/api/cameras/${cid}/parameters`);
    if (!paramState[cid]) paramState[cid] = {};
    const ps = paramState[cid];
    if (!ps.dirty) {
      if (p.ExposureTime) ps.exposure = p.ExposureTime.current;
      if (p.Gain)         ps.gain     = p.Gain.current;
    }
    if (p._stats) updateStats(cid, p._stats);
  } catch(e) {}
}

function updateStats(cid, s) {
  const fps = document.getElementById('fps-' + cid);
  const fc  = document.getElementById('fc-'  + cid);
  const lp  = document.getElementById('lp-'  + cid);
  if (fps) fps.textContent = s.acq_fps ?? '—';
  if (fc)  fc.textContent  = s.frame_count ?? '—';
  if (lp)  lp.textContent  = s.lost_packets ?? '—';
}

async function pollStats() {
  for (const cid of Object.keys(cameras)) {
    if (!cameras[cid].is_open) continue;
    try {
      const p = await api(`/api/cameras/${cid}/parameters`);
      if (p._stats) updateStats(cid, p._stats);
      const ps = paramState[cid];
      if (ps && !ps.dirty) {
        if (p.ExposureTime) ps.exposure = p.ExposureTime.current;
        if (p.Gain)         ps.gain     = p.Gain.current;
      }
    } catch(e) {}
  }
}

// ── Tags ──────────────────────────────────────────────────────────────────
function toggleTag(tag) {
  if (selectedTags.has(tag)) selectedTags.delete(tag);
  else selectedTags.add(tag);
  document.querySelectorAll('#tag-seg .seg-btn').forEach(btn => {
    btn.classList.toggle('active', selectedTags.has(btn.dataset.tag));
  });
}

// ── Global FPS ────────────────────────────────────────────────────────────
async function onGlobalFps(raw) {
  const fps = Math.min(35, Math.max(1, Math.round(parseFloat(raw) || globalFps)));
  document.getElementById('fps-input').value = fps;
  globalFps = fps;
  if (!isRecording) {
    for (const cid of Object.keys(cameras)) {
      if (cameras[cid].is_open) {
        await api(`/api/cameras/${cid}/parameters`, 'POST', { frame_rate: fps });
      }
    }
  }
}

// ── Recording (always studio) ─────────────────────────────────────────────
async function ensureStudioConnected() {
  if (studioConnected) return true;
  document.getElementById('rec-label').textContent = 'connecting…';
  const res = await api('/api/studio/connect', 'POST');
  if (res.ok) {
    studioConnected = true;
    document.getElementById('studio-dot').classList.add('connected');
    document.getElementById('studio-label').classList.add('connected');
    return true;
  }
  alert('Studio connect failed: ' + res.error);
  document.getElementById('rec-label').textContent = 'idle';
  return false;
}

async function toggleRecording() {
  const btn = document.getElementById('btn-rec');
  btn.disabled = true;
  if (!isRecording) {
    if (!(await ensureStudioConnected())) { btn.disabled = false; return; }
    const res = await api('/api/studio/start', 'POST', { frequency_hz: globalFps, tags: [...selectedTags] });
    if (res.ok) {
      isRecording = true;
      document.getElementById('rec-dot').classList.add('active');
      document.getElementById('rec-label').textContent = res.recording_id;
      btn.textContent = '■\u00a0Stop'; btn.className = 'btn danger';
    } else { alert('Start recording failed: ' + res.error); }
  } else {
    document.getElementById('rec-label').textContent = 'stopping…';
    const res = await api('/api/studio/stop', 'POST');
    if (res.ok) {
      isRecording = false;
      document.getElementById('rec-dot').classList.remove('active');
      const total = Object.values(res.frame_counts || {}).reduce((a,b)=>a+b,0);
      let label = `saved · ${total} frames`;
      if (res.sync) {
        label += ` · ${res.sync.sync_count} syncs · ${res.sync.recording_frequency.toFixed(1)} Hz`;
      }
      if (res.warnings && res.warnings.length) {
        label += ` · ${res.warnings.length} warning${res.warnings.length > 1 ? 's' : ''}`;
      }
      document.getElementById('rec-label').textContent = label;
      btn.textContent = '●\u00a0Record'; btn.className = 'btn primary';
    } else {
      alert('Stop recording failed: ' + res.error);
      document.getElementById('rec-label').textContent = 'error';
    }
  }
  btn.disabled = false;
}

// ── Recordings tab ────────────────────────────────────────────────────────
function updateSelectionToolbar() {
  const toolbar = document.getElementById('rec-toolbar');
  const count   = document.getElementById('rec-sel-count');
  toolbar.classList.toggle('visible', selectedRecs.size > 0);
  count.textContent = `${selectedRecs.size} selected`;
}

function toggleRecSel(event, id) {
  event.stopPropagation(); // don't expand the row
  if (selectedRecs.has(id)) selectedRecs.delete(id);
  else selectedRecs.add(id);
  const item = event.target.closest('.rec-item');
  if (item) item.classList.toggle('selected', selectedRecs.has(id));
  updateSelectionToolbar();
}

function clearSelection() {
  selectedRecs.clear();
  document.querySelectorAll('.rec-item').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.rec-check').forEach(cb => cb.checked = false);
  updateSelectionToolbar();
}

async function deleteSelected() {
  if (!selectedRecs.size) return;
  const ids = [...selectedRecs];
  if (!confirm(`Delete ${ids.length} recording${ids.length > 1 ? 's' : ''}?\nThis cannot be undone.`)) return;
  for (const id of ids) {
    const res = await api(`/api/recordings/${id}`, 'DELETE');
    if (res.ok) selectedRecs.delete(id);
  }
  loadRecordings();
}

async function loadRecordings() {
  const list = document.getElementById('rec-list');
  list.innerHTML = '<div class="empty"><div class="spinner"></div>Loading…</div>';
  const recordings = await api('/api/recordings');
  if (!recordings.length) {
    list.innerHTML = '<div class="empty">No recordings yet.</div>';
    updateSelectionToolbar();
    return;
  }
  list.innerHTML = '';
  recordings.forEach(r => list.appendChild(buildRecItem(r)));
  updateSelectionToolbar();
}

function buildRecItem(r) {
  const el = document.createElement('div');
  el.className = 'rec-item';

  const camCount = (r.cameras || []).length;
  const totalFrames = (r.cameras || []).reduce((s,c) => s+c.frame_count, 0);
  const totalBytes  = (r.cameras || []).reduce((s,c) => s+c.total_size_bytes, 0);
  const dur = r.duration_seconds != null ? fmtDur(r.duration_seconds) : '—';
  const size = fmtBytes(totalBytes);

  if (selectedRecs.has(r.recording_id)) el.classList.add('selected');

  el.innerHTML = `
    <div class="rec-item-hdr" onclick="toggleRecItem(this)">
      <input type="checkbox" class="rec-check" ${selectedRecs.has(r.recording_id) ? 'checked' : ''}
        onclick="toggleRecSel(event,'${r.recording_id}')">
      <span class="rec-id">${r.recording_id}</span>
      <div class="rec-pills">
        <span class="pill">${camCount} cam${camCount!==1?'s':''}</span>
        <span class="pill">${totalFrames.toLocaleString()} frames</span>
        <span class="pill">${dur}</span>
        <span class="pill">${size}</span>
        ${(r.tags||[]).map(t=>`<span class="pill" style="color:var(--accent);border-color:#1e3a5f">${t}</span>`).join('')}
      </div>
      <div class="rec-item-hdr-sep"></div>
      <button class="del-btn" onclick="deleteRecording(event,'${r.recording_id}')" title="Delete recording">
        <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
      </button>
      <span class="rec-chev">&#9660;</span>
    </div>
    <div class="rec-detail">
      ${buildRecDetail(r)}
    </div>`;
  return el;
}

function toggleRecItem(hdr) {
  hdr.classList.toggle('open');
  hdr.nextElementSibling.classList.toggle('open');
}

function buildRecDetail(r) {
  const start = r.start_time ? fmtTs(r.start_time) : '—';
  const end   = r.end_time   ? fmtTs(r.end_time)   : '—';
  const dur   = r.duration_seconds != null ? fmtDur(r.duration_seconds) : '—';
  const totalBytes = (r.cameras||[]).reduce((s,c)=>s+c.total_size_bytes,0);

  const cells = [
    ['Recording ID', r.recording_id],
    ['Started',      start],
    ['Ended',        end],
    ['Duration',     dur],
    ['Total Size',   fmtBytes(totalBytes)],
    ['Cameras',      (r.cameras||[]).length],
  ];

  const metaGrid = cells.map(([l,v]) =>
    `<div class="rec-meta-cell"><div class="lbl">${l}</div><div class="val">${v}</div></div>`
  ).join('');

  const camCards = (r.cameras||[]).map(c => buildCamCard(c)).join('');

  return `
    <div class="rec-meta-grid">${metaGrid}</div>
    <div class="rec-cameras-hdr">Cameras (${(r.cameras||[]).length})</div>
    <div class="rec-cameras-grid">${camCards}</div>`;
}

function buildCamCard(c) {
  const params = c.parameters || {};
  const paramRows = [
    ['Exposure',   params.exposure_us  != null ? Math.round(params.exposure_us)  + ' µs' : '—'],
    ['Gain',       params.gain_db      != null ? parseFloat(params.gain_db).toFixed(1) + ' dB' : '—'],
    ['Frame Rate', params.frame_rate   != null ? parseFloat(params.frame_rate).toFixed(1) + ' fps' : '—'],
  ].map(([k,v]) =>
    `<div class="cam-param-row"><span class="pk">${k}</span><span class="pv">${v}</span></div>`
  ).join('');

  return `
    <div class="cam-card">
      <div class="cam-card-hdr">
        <div>
          <div class="cam-card-id">${c.serial}</div>
          <div class="cam-card-model">${c.model || '—'} &middot; ${c.ip}</div>
        </div>
        <div class="cam-stat">
          <div class="sv">${(c.frame_count||0).toLocaleString()}</div>
          <div class="sl">frames</div>
        </div>
      </div>
      <div class="cam-params">
        <div class="cam-param-row">
          <span class="pk">Size</span>
          <span class="pv">${fmtBytes(c.total_size_bytes||0)}</span>
        </div>
        ${paramRows}
      </div>
    </div>`;
}

// ── Formatting helpers ────────────────────────────────────────────────────
function fmtTs(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleString('en-GB', { dateStyle:'medium', timeStyle:'medium', timeZone:'UTC' }) + ' UTC';
  } catch { return iso; }
}

function fmtDur(s) {
  if (s < 60) return s.toFixed(1) + 's';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}m ${sec}s`;
}

function fmtBytes(b) {
  if (!b) return '0 B';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(2) + ' GB';
}

async function deleteRecording(event, recordingId) {
  event.stopPropagation();
  if (!confirm(`Delete recording ${recordingId}?\nThis cannot be undone.`)) return;
  const res = await api(`/api/recordings/${recordingId}`, 'DELETE');
  if (res.ok) {
    selectedRecs.delete(recordingId);
    loadRecordings();
  } else {
    alert('Delete failed: ' + res.error);
  }
}

// ── Studio status poll ────────────────────────────────────────────────────
async function pollStudioStatus() {
  try {
    const s = await api('/api/studio/status');
    studioConnected = s.arduino_connected && s.pico_open;
    const dot = document.getElementById('studio-dot');
    const label = document.getElementById('studio-label');
    dot.classList.toggle('connected', studioConnected);
    label.classList.toggle('connected', studioConnected);
    if (s.recording && !isRecording) {
      isRecording = true;
      document.getElementById('rec-dot').classList.add('active');
      document.getElementById('btn-rec').textContent = '■\u00a0Stop';
      document.getElementById('btn-rec').className = 'btn danger';
    }
  } catch(e) {}
}

// ── Boot ──────────────────────────────────────────────────────────────────
init();
pollStudioStatus();
setInterval(pollStats, 2000);
setInterval(pollStudioStatus, 3000);
</script>
</body>
</html>
